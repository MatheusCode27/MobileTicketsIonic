<ion-header>
  <ion-toolbar color="primary">
    <ion-title>
  Atendimento
</ion-title>

<p class="relogio">
  {{ ticketService.horaAtual }}
</p>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <h2>Senha Atual</h2>

  <ion-card>
    <ion-card-content>
      {{ ticketService.senhaAtual }}
    </ion-card-content>
  </ion-card>

  <ion-button expand="block" (click)="chamarSenha()">
    Chamar Próxima Senha
  </ion-button>

</ion-content>
