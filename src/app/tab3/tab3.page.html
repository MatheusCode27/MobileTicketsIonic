<ion-header>
  <ion-toolbar color="primary">
    <ion-title>
  Painel
</ion-title>

<p class="relogio">
  {{ ticketService.horaAtual }}
</p>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <h2>Senha Atual</h2>

  <ion-card class="painel-card">
  <ion-card-content class="senha-atual">
    {{ ticketService.senhaAtual }}
  </ion-card-content>
</ion-card>

  <h2>Últimas Chamadas</h2>

  <ion-list>
    <ion-item *ngFor="let senha of ticketService.ultimasChamadas">
      {{ senha }}
    </ion-item>
  </ion-list>

</ion-content>
